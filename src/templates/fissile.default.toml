# fissile configuration (§FS-001-config).
#
# Every value is written explicitly at its default so the file is editable in
# place without consulting the spec (§DF-002-explicit-config). The defaults are
# deliberately generic; tune the rules and messages to match this repository's
# architecture once you know its layout.

fissile_config_version = 1

[scan]
# `audit` walks these roots; `check --staged` ignores them and takes its file
# set from git. Both honor `exclude` and `.gitignore`. The default walks the
# whole repository so adoption needs no layout guess; narrow it to specific
# roots once you know which directories are worth auditing.
include = ["."]
exclude = [
  "target/**",
  "node_modules/**",
  ".git/**",
  "dist/**",
  "build/**",
  "vendor/**",
  "**/*.lock",
  "**/*.min.*",
  "**/*.png",
  "**/*.jpg",
  "**/*.jpeg",
  "**/*.gif",
  "**/*.webp",
  "**/*.pdf",
]
respect_gitignore = true

[output]
format = "text" # text | json
color = "auto"  # auto | always | never
success = "ok"

[exceptions]
soft_registry = "docs/file-size-agent-exceptions.toml"
hard_registry = "docs/file-size-human-exceptions.toml"
stale = "warn" # warn | error | ignore

[tokens]
# Token budgets are opt-in; bytes and lines work without external tooling.
enabled = false
command = ["token-counter", "--count", "{path}"]

[[messages]]
id = "split-source"
text = "Split {path}: move cohesive helpers into a sibling module before adding more code (§GOAL-008-remediation-messages)."

[[messages]]
id = "split-doc"
text = "Split {path}: keep the declaration focused and move secondary detail into a cited child spec (§GOAL-008-remediation-messages)."

[[messages]]
id = "large-file-default"
text = "Large file {path}: exclude generated/binary assets, or add a narrower rule with local guidance (§FS-001-config.3.3)."

[[rules]]
id = "large-file-default"
include = ["**/*"]
unit = "bytes"
soft = 524288
hard = 1048576
message = "large-file-default"

# Hand-written source, matched by extension so the budget follows the code into
# whatever layout a repo uses (src/, cmd/, pkg/, lib/, app/, or the root) rather
# than a guessed set of directories. Data and generated formats (.json, .sql,
# .csv) are deliberately absent — they fall to the byte catch-all, because a
# large generated file is not the same problem as a large hand-written module
# (§GND-001-fissile). Add or drop extensions to match this repository.
[[rules]]
id = "source"
include = [
  "**/*.rs", "**/*.go", "**/*.py", "**/*.rb", "**/*.php",
  "**/*.java", "**/*.kt", "**/*.kts", "**/*.scala", "**/*.swift", "**/*.cs",
  "**/*.c", "**/*.h", "**/*.cc", "**/*.cpp", "**/*.cxx", "**/*.hpp",
  "**/*.js", "**/*.jsx", "**/*.mjs", "**/*.cjs", "**/*.ts", "**/*.tsx",
  "**/*.vue", "**/*.svelte", "**/*.lua", "**/*.ex", "**/*.exs", "**/*.dart",
]
unit = "lines"
soft = 350
hard = 550
count_blank_lines = false
count_comment_lines = true
message = "split-source"

[[rules]]
id = "markdown-docs"
include = ["**/*.md"]
unit = "lines"
soft = 250
hard = 500
count_blank_lines = false
count_comment_lines = true
message = "split-doc"
