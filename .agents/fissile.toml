fissile_config_version = 1

[scan]
include = [
  "src",
  "benches",
  "docs",
  "e2e",
  "examples",
  "scripts",
  ".github",
  "README.md",
  "CLAUDE.md",
  "Cargo.toml",
]
exclude = [
  "target/**",
  ".git/**",
  "**/*.lock",
  "**/*.profraw",
  "**/*.profdata",
  "**/*.png",
  "**/*.jpg",
  "**/*.jpeg",
  "**/*.gif",
  "**/*.webp",
  "**/*.pdf",
]
respect_gitignore = true

[output]
format = "text"
color = "auto"
success = "ok"

[exceptions]
soft_registry = "docs/file-size-agent-exceptions.toml"
hard_registry = "docs/file-size-human-exceptions.toml"
stale = "warn"

[tokens]
enabled = false
command = ["token-counter", "--count", "{path}"]

[[messages]]
id = "split-rust-library"
text = "Split {path}: move cohesive library behavior into smaller modules before adding more surface area (§GOAL-008-remediation-messages)."

[[messages]]
id = "split-rust-benchmark"
text = "Split {path}: keep benchmark setup and measured cases compact so performance changes stay reviewable (§AR-002-instruction-benchmarks)."

[[messages]]
id = "split-spec"
text = "Split {path}: keep each declaration focused and move secondary detail into a narrower cited spec (§GOAL-008-remediation-messages)."

[[messages]]
id = "split-tooling"
text = "Split {path}: keep workflow and helper scripts short enough to audit quickly (§AR-001-ci)."

[[messages]]
id = "large-file-default"
text = "Large file {path}: exclude generated/binary assets, or add a narrower rule with local architecture guidance (§FS-001-config.3.3)."

[[rules]]
id = "large-file-default"
include = ["**/*"]
unit = "bytes"
soft = 65536
hard = 131072
message = "large-file-default"

[[rules]]
id = "rust-library"
include = ["src/**/*.rs"]
unit = "lines"
soft = 700
hard = 900
count_blank_lines = false
count_comment_lines = true
message = "split-rust-library"

[[rules]]
id = "rust-benchmarks"
include = ["benches/**/*.rs"]
unit = "lines"
soft = 250
hard = 400
count_blank_lines = false
count_comment_lines = true
message = "split-rust-benchmark"

[[rules]]
id = "spec-docs"
include = ["docs/**/*.md", "README.md", "CLAUDE.md", "examples/**/*.md", "e2e/**/*.md"]
unit = "lines"
soft = 225
hard = 350
count_blank_lines = false
count_comment_lines = true
message = "split-spec"

[[rules]]
id = "tooling"
include = [".github/**/*.yml", ".github/**/*.yaml", "scripts/**/*.sh"]
unit = "lines"
soft = 200
hard = 350
count_blank_lines = false
count_comment_lines = true
message = "split-tooling"

[[rules]]
id = "config-toml"
include = ["**/*.toml"]
unit = "lines"
soft = 180
hard = 300
count_blank_lines = false
count_comment_lines = true
message = "split-tooling"
