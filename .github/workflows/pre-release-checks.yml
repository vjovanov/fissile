name: Pre-release checks

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pgo-release-artifacts:
    name: build PGO release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-prerelease-pgo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prerelease-pgo-
            ${{ runner.os }}-cargo-

      - name: Build PGO release artifacts
        run: bash scripts/pgo-build.sh

      - name: Binary-size guard
        shell: bash
        run: |
          # Strip and measure the release binary, failing past a documented
          # ceiling (§AR-001-ci.7 / §GOAL-002-tiny-footprint.3). The limit is
          # generous; it guards the single-binary contract against silent
          # inflation, not small movements.
          bin="target/release/fissile"
          strip "$bin"
          max_bytes=$((8 * 1024 * 1024))
          size=$(stat -c %s "$bin")
          echo "stripped fissile: $size bytes (ceiling $max_bytes)"
          if [ "$size" -gt "$max_bytes" ]; then
            echo "::error::fissile binary $size bytes exceeds ${max_bytes}-byte ceiling" >&2
            exit 1
          fi
