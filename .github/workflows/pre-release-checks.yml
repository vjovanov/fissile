name: Pre-release checks

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pgo-release-artifacts:
    name: build PGO release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-prerelease-pgo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prerelease-pgo-
            ${{ runner.os }}-cargo-

      - name: Build PGO release artifacts
        run: bash scripts/pgo-build.sh
